name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pylint black isort

      - name: Check formatting with Black
        working-directory: ./backend
        run: black --check . || true

      - name: Check import ordering with isort
        working-directory: ./backend
        run: isort --check-only . || true

      - name: Lint with pylint
        working-directory: ./backend
        run: pylint api core services models --exit-zero || true

      - name: Run unit tests
        working-directory: ./backend
        run: pytest ../tests/ -v --tb=short --cov=api --cov=core --cov=services --cov-report=term-missing
        env:
          PYTHONPATH: .
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'http://localhost:54321' }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || 'test-key' }}
          QDRANT_URL: ${{ secrets.QDRANT_URL || 'http://localhost:6333' }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY || '' }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY || 'test-key' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'test-key' }}
          GOOGLE_GEMINI_API_KEY: ${{ secrets.GOOGLE_GEMINI_API_KEY || 'test-key' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY || 'test-key' }}
          SANDBOX_URL: ${{ secrets.SANDBOX_URL || 'http://localhost:8001' }}

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false
