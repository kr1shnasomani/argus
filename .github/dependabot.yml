# Dependabot configuration for Argus
# Keeps GitHub Actions, Python (backend + sandbox), npm (frontend), and Docker up to date.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:

  # GitHub Actions — keep all workflow action versions current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"

  # Python — backend
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
    ignore:
      # pytest 9.x is incompatible with all versions of pytest-asyncio
      - dependency-name: "pytest"
        versions: [">=9"]
      # TypeScript 6 is a major breaking release — hold until ecosystem catches up
      - dependency-name: "typescript"
        versions: [">=6"]

  # Python — sandbox
  - package-ecosystem: "pip"
    directory: "/sandbox"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"

  # Node.js — frontend
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "javascript"
    ignore:
      # ESLint 10 is a major breaking release — plugins not compatible yet
      - dependency-name: "eslint"
        versions: [">=10"]
      # TypeScript 6 is a major breaking release
      - dependency-name: "typescript"
        versions: [">=6"]

  # Docker — base image in Dockerfile
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "docker"
