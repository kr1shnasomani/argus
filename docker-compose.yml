services:
  # ── Backend API ─────────────────────────────────────────────── port 8005 ──
  backend:
    image: ghcr.io/kr1shnasomani/argus:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    environment:
      - SERVICE=backend
      # When running as separate containers, backend must reach sandbox by
      # its Docker service name, not localhost
      - SANDBOX_URL=http://sandbox:8001
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - sandbox

  # ── Sandbox API ─────────────────────────────────────────────── port 8001 ──
  sandbox:
    image: ghcr.io/kr1shnasomani/argus:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - SERVICE=sandbox
    env_file:
      - .env
    restart: unless-stopped

  # ── Frontend UI ─────────────────────────────────────────────── port 5173 ──
  frontend:
    image: ghcr.io/kr1shnasomani/argus:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - SERVICE=frontend
    env_file:
      - .env
    restart: unless-stopped
